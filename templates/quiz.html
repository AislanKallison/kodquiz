{% extends 'base.html' %}

{% block content %}
<h1>Quiz de Python</h1>

<form method="POST" action="{{ url_for('submit') }}">
    {% for q in questions %}
    <div class="card">
        <div class="card-header">Pergunta {{ q.id }}</div>
        <div class="card-body">
            <p><strong>{{ q.question }}</strong></p>
            
            {% for option in q.options %}
            <div class="option">
                <label>
                    <input type="radio" name="q_{{ q.id }}" value="{{ option[0] }}">
                    {{ option }}
                </label>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endfor %}

    <div style="text-align: center; margin-top: 30px;">
        <button type="submit" class="btn btn-success">ENVIAR RESPOSTAS</button>
    </div>
</form>
{% endblock %}
