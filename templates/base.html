<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>kodland</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> 
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='imagens/kodland_logo.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='imagens/kodland_logo.png') }}">
    <style>
        body { background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; color: white; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <nav class="navbar navbar-light shadow" style="background-color: cornflowerblue;">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
                <img src="{{ url_for('static', filename='imagens/kodland_logo.png') }}" 
                     alt="Logo" width="40" height="40" class="me-2">
                
            </a>
        </div>
    </nav>

    <div class="container mt-5">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
